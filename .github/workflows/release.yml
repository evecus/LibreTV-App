name: Release Build (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        type: string

jobs:
  build_windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version in package.json, tauri.conf.json and Cargo.toml
        run: |
          $version = "${{ github.event.inputs.version }}"
          Write-Host "Using App Version: $version"

          # Update package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json"
          Write-Host "Updated package.json to $version"

          # Update tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json"
          Write-Host "Updated src-tauri/tauri.conf.json to $version"

          # Update Cargo.toml — only replace version inside [package] section
          $cargoLines = Get-Content "src-tauri/Cargo.toml"
          $inPackage = $false
          $replaced = $false
          $result = foreach ($line in $cargoLines) {
            if ($line -match '^\[package\]') { $inPackage = $true }
            elseif ($line -match '^\[') { $inPackage = $false }
            if ($inPackage -and -not $replaced -and $line -match '^version\s*=\s*"') {
              $line = "version = `"$version`""
              $replaced = $true
            }
            $line
          }
          $result | Set-Content "src-tauri/Cargo.toml"
          Write-Host "Updated src-tauri/Cargo.toml to $version"
        shell: pwsh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri Windows application
        run: npm run tauri build

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
